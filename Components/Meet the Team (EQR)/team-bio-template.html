<div class="team-bio">
  <div class="team-bio__header">
    <img
      src="[Headshot]"
      alt="[FirstName] [LastName]"
      class="team-bio__headshot"
      loading="lazy"
    >
    <div class="team-bio__header-info">
      <h1 class="team-bio__name">[FirstName] [LastName]</h1>
      <p class="team-bio__contact">
        [PhoneLink]
      </p>
      <p class="team-bio__contact">
        <a href="mailto:[email]" title="Email [FirstName]">[email]</a>
      </p>
    </div>
  </div>

  <div class="team-bio__body">
    [Bio]
  </div>
</div>
